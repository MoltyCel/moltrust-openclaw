name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run build
      - name: Verify plugin manifest
        run: |
          node -e "
            var m = require('./openclaw.plugin.json');
            var p = require('./package.json');
            if (!m.id) throw new Error('Missing plugin id');
            if (!p.openclaw || !p.openclaw.extensions || !p.openclaw.extensions.length) throw new Error('Missing openclaw.extensions');
            console.log('Plugin manifest valid — id:', m.id);
          "
